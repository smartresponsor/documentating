name: switch-owner-v2-on-push

on:
  push:
    branches: ["master"]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: "documentating-owner-v2-switch"
  cancel-in-progress: false

jobs:
  switch:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip owner-switch-v2]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Copy owner v2 playbook into canonical owner playbook path
        run: |
          cp antora-playbook-owner-v2.yml antora-playbook-owner.yml

      - name: Commit and push owner playbook switch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add antora-playbook-owner.yml
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "docs(ui): switch owner playbook to Oleksandr [skip owner-switch-v2]"
            git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin HEAD:master
          else
            echo "Owner playbook already uses Oleksandr." 
          fi
