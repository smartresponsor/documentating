name: docs-gh-pages

on:
  push:
    branches: [ "master" ]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: "gh-pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install mkdocs mkdocs-material mkdocs-static-i18n

      - name: Deploy to gh-pages
        run: |
          python -m mkdocs gh-deploy -f .site/mkdocs.yml --force --clean --no-history