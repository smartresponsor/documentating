name: quality-atlas-assessment

on:
  workflow_dispatch: {}
  schedule:
    - cron: '27 9 */2 * *'

permissions:
  contents: write

concurrency:
  group: quality-atlas-assessment
  cancel-in-progress: false

jobs:
  assess:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Seed current component snapshots
        run: |
          python3 tools/seed_quality_atlas_snapshots.py

      - name: Run scheduled assessment dry-run or AI-backed pass
        id: assessment
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          QUALITY_ATLAS_OPENAI_MODEL: ${{ vars.QUALITY_ATLAS_OPENAI_MODEL || 'gpt-5' }}
        run: |
          mode="dry-run"
          if [ -n "${OPENAI_API_KEY}" ]; then
            mode="responses"
          fi
          echo "mode=${mode}" >> "$GITHUB_OUTPUT"
          python3 tools/run_quality_atlas_assessment.py --mode "$mode"

      - name: Upload assessment run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-atlas-assessment-${{ github.run_id }}
          path: |
            .sync/quality-atlas/generated/assessment-runs
            .sync/quality-atlas/generated/latest-assessment-summary.json
          if-no-files-found: warn

      - name: Regenerate portfolio pages
        if: success()
        run: |
          python3 tools/generate_quality_atlas_portfolio.py

      - name: Commit assessment artifacts
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .sync/quality-atlas .antora-src/modules/ROOT/pages/quality-atlas .antora-src/modules/ROOT/nav.adoc .antora-src/modules/ROOT/pages/index.adoc
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "docs(quality-atlas): refresh snapshots and portfolio"
            git push origin HEAD:master
          else
            echo "No quality atlas changes to commit."
          fi
