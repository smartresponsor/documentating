name: fix-v6-pages-on-push

on:
  push:
    branches: ["master"]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: "documentating-fix-v6-pages"
  cancel-in-progress: false

jobs:
  fix:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip self-fix-v6]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Rewrite canonical publish workflow to v6 and update footer
        run: |
          python3 - <<'PY'
          from pathlib import Path
          root = Path('.')
          gh = root / '.github' / 'workflows' / 'gh-pages.yml'
          text = gh.read_text(encoding='utf-8')
          text = text.replace('python3 tools/build_antora_site_v5.py', 'python3 tools/build_antora_site_v6.py')
          gh.write_text(text, encoding='utf-8')

          footer = root / 'supplemental-ui' / 'partials' / 'footer.hbs'
          footer.parent.mkdir(parents=True, exist_ok=True)
          footer.write_text('''<footer class="footer">
  <p>Marketing America Corp · High Hope · Oleksandr Tishchenko</p>
  <p>
    <a href="{{relativize '/contact/'}}">Contact</a> ·
    <a href="{{relativize '/privacy/'}}">Privacy</a> ·
    <a href="{{relativize '/terms/'}}">Terms</a>
  </p>
</footer>
''', encoding='utf-8')
          PY

      - name: Commit and push v6 self-fix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/gh-pages.yml supplemental-ui/partials/footer.hbs
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "docs(site): switch to v6 pages and owner footer [skip self-fix-v6]"
            git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin HEAD:master
          else
            echo "No v6 self-fix changes required."
          fi
