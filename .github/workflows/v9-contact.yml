name: v9-contact
on:
  workflow_run:
    workflows: ["publish-v8-footer-after-v7"]
    types: [completed]
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
          python -m pip install --upgrade pip
          python -m pip install pyyaml
          npm install
      - run: |
          python3 tools/build_antora_site_v9.py
          npx antora antora-playbook.yml --fetch
          if [ -f docs/CNAME ]; then cp docs/CNAME .site_build/CNAME; fi
          if [ -d docs/assets ]; then mkdir -p .site_build/assets && cp -R docs/assets/. .site_build/assets/; fi
          if [ -d assets ]; then mkdir -p .site_build/assets && cp -R assets/. .site_build/assets/; fi
          touch .site_build/.nojekyll
      - run: |
          python3 - <<'PY'
          from pathlib import Path
          old1='<footer class="footer">\n  <p>Marketing America Corp · High Hope · Alexander Tishchenko</p>\n</footer>'
          old2='<footer class="footer">\n  <p>Marketing America Corp · High Hope · Oleksandr Tishchenko</p>\n</footer>'
          new='<footer class="footer">\n  <p>Marketing America Corp · High Hope · Oleksandr Tishchenko</p>\n  <p><a href="/contact/">Contact</a> · <a href="/privacy/">Privacy</a> · <a href="/terms/">Terms</a></p>\n</footer>'
          for p in Path('.site_build').rglob('*.html'):
              t=p.read_text(encoding='utf-8')
              t=t.replace(old1,new).replace(old2,new)
              p.write_text(t,encoding='utf-8')
          PY
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          w="$(mktemp -d)"
          if git ls-remote --exit-code origin gh-pages >/dev/null 2>&1; then git fetch origin gh-pages:gh-pages; git worktree add --force "$w" gh-pages; else git worktree add --detach "$w"; (cd "$w" && git checkout --orphan gh-pages); fi
          find "$w" -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R .site_build/. "$w"/
          (cd "$w" && git add -A && if [ -n "$(git status --porcelain)" ]; then git commit -m "docs: publish v9 contact site" && git push origin HEAD:gh-pages --force; else echo "No v9 site changes to publish."; fi)
          git worktree remove "$w" --force || true
