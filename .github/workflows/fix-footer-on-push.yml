name: fix-footer-on-push

on:
  push:
    branches: ["master"]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: "documentating-fix-footer"
  cancel-in-progress: false

jobs:
  fix:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip footer-fix]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Rewrite owner footer
        run: |
          python3 - <<'PY'
          from pathlib import Path
          footer = Path('supplemental-ui/partials/footer.hbs')
          footer.parent.mkdir(parents=True, exist_ok=True)
          footer.write_text('''<footer class="footer">
  <p>Marketing America Corp · High Hope · Oleksandr Tishchenko</p>
  <p>
    <a href="{{relativize '/contact/'}}">Contact</a> ·
    <a href="{{relativize '/privacy/'}}">Privacy</a> ·
    <a href="{{relativize '/terms/'}}">Terms</a>
  </p>
</footer>
''', encoding='utf-8')
          PY

      - name: Commit and push footer fix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add supplemental-ui/partials/footer.hbs
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "docs(ui): fix owner footer [skip footer-fix]"
            git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin HEAD:master
          else
            echo "Owner footer already updated."
          fi
