site_name: Smart Responsor Documentation
site_url: https://<YOUR_GITHUB_PAGES_URL>/
repo_url: https://github.com/<ORG>/<REPO>
repo_name: <ORG>/<REPO>

docs_dir: ../content
site_dir: ../.site_build

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - search.highlight

plugins:
  - search

nav:
  - Home: index.md
  - Articles: article/index.md
  - Components: component/index.md
