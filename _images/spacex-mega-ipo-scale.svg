<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <style>
    .t{font:700 34px Arial,sans-serif;fill:#111}
    .h{font:700 24px Arial,sans-serif;fill:#111}
    .s{font:20px Arial,sans-serif;fill:#111}
    .b{fill:#fff;stroke:#111;stroke-width:3}
    .bar{fill:#fff;stroke:#111;stroke-width:2.5}
  </style>
  <text x="700" y="60" text-anchor="middle" class="t">A Mega-IPO Is Not Just a Listing — It Is a Market-Depth Test</text>

  <rect x="140" y="130" width="1120" height="560" class="b" rx="18" ry="18"/>
  <line x1="240" y1="620" x2="1180" y2="620" stroke="#111" stroke-width="3"/>
  <line x1="240" y1="220" x2="240" y2="620" stroke="#111" stroke-width="3"/>

  <text x="220" y="210" class="s">larger proceeds</text>
  <text x="610" y="670" class="s">illustrative public-offering scale</text>

  <rect x="330" y="520" width="150" height="100" class="bar" rx="12" ry="12"/>
  <text x="405" y="555" text-anchor="middle" class="h">Typical IPO</text>
  <text x="405" y="588" text-anchor="middle" class="s">absorbed without</text>
  <text x="405" y="613" text-anchor="middle" class="s">redefining the cycle</text>

  <rect x="620" y="390" width="170" height="230" class="bar" rx="12" ry="12"/>
  <text x="705" y="425" text-anchor="middle" class="h">Large IPO</text>
  <text x="705" y="458" text-anchor="middle" class="s">major bookbuilding</text>
  <text x="705" y="483" text-anchor="middle" class="s">and sentiment test</text>

  <rect x="920" y="210" width="190" height="410" class="bar" rx="12" ry="12"/>
  <text x="1015" y="245" text-anchor="middle" class="h">Mega-listing</text>
  <text x="1015" y="278" text-anchor="middle" class="s">can reset the tone</text>
  <text x="1015" y="303" text-anchor="middle" class="s">of the whole calendar</text>
  <text x="1015" y="328" text-anchor="middle" class="s">and test liquidity depth</text>

  <text x="170" y="755" class="s">Editorial schematic: the point is not exact deal math, but the difference between a large offering and one that becomes a system-level signal.</text>
</svg>
