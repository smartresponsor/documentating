<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <rect width="1200" height="420" fill="white"/>
  <text x="60" y="55" font-size="28" font-family="Arial">From Copilot to Outcome Engine</text>

  <rect x="60" y="110" width="180" height="180" rx="16" fill="#f3f4f6" stroke="#9ca3af" stroke-width="2"/>
  <text x="88" y="170" font-size="24" font-family="Arial">Tool</text>
  <text x="88" y="205" font-size="16" font-family="Arial">User does the work</text>
  <text x="88" y="230" font-size="16" font-family="Arial">Software provides</text>
  <text x="88" y="252" font-size="16" font-family="Arial">features and speed</text>

  <rect x="280" y="110" width="180" height="180" rx="16" fill="#eef2ff" stroke="#818cf8" stroke-width="2"/>
  <text x="305" y="170" font-size="24" font-family="Arial">Copilot</text>
  <text x="305" y="205" font-size="16" font-family="Arial">Human stays in flow</text>
  <text x="305" y="230" font-size="16" font-family="Arial">AI accelerates</text>
  <text x="305" y="252" font-size="16" font-family="Arial">bounded tasks</text>

  <rect x="500" y="110" width="180" height="180" rx="16" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/>
  <text x="525" y="170" font-size="24" font-family="Arial">Workflow</text>
  <text x="525" y="205" font-size="16" font-family="Arial">AI coordinates steps</text>
  <text x="525" y="230" font-size="16" font-family="Arial">with approvals and</text>
  <text x="525" y="252" font-size="16" font-family="Arial">exceptions</text>

  <rect x="720" y="110" width="180" height="180" rx="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="745" y="170" font-size="24" font-family="Arial">Autopilot</text>
  <text x="745" y="205" font-size="16" font-family="Arial">AI executes most</text>
  <text x="745" y="230" font-size="16" font-family="Arial">of the process</text>
  <text x="745" y="252" font-size="16" font-family="Arial">under supervision</text>

  <rect x="940" y="110" width="200" height="180" rx="16" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="968" y="170" font-size="24" font-family="Arial">Outcome Engine</text>
  <text x="968" y="205" font-size="16" font-family="Arial">Customer buys the</text>
  <text x="968" y="230" font-size="16" font-family="Arial">finished result,</text>
  <text x="968" y="252" font-size="16" font-family="Arial">not the interface</text>

  <line x1="240" y1="200" x2="280" y2="200" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="460" y1="200" x2="500" y2="200" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="680" y1="200" x2="720" y2="200" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="900" y1="200" x2="940" y2="200" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="60" y="360" font-size="18" font-family="Arial">Value migrates from interface efficiency to accountable execution.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
