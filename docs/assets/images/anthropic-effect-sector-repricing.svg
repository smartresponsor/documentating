<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <style>
    .t{font:700 34px Arial,sans-serif;fill:#111}
    .h{font:700 24px Arial,sans-serif;fill:#111}
    .s{font:20px Arial,sans-serif;fill:#111}
    .b{fill:#fff;stroke:#111;stroke-width:3}
    .d{stroke:#111;stroke-width:2.5;stroke-dasharray:9 9;fill:none}
  </style>
  <text x="800" y="60" text-anchor="middle" class="t">Sector Repricing Logic After a Cyber-Capable AI Signal</text>

  <rect x="180" y="170" rx="16" ry="16" width="360" height="120" class="b"/>
  <text x="360" y="225" text-anchor="middle" class="h">cybersecurity vendors</text>
  <text x="360" y="260" text-anchor="middle" class="s">response speed and relevance re-examined</text>

  <rect x="620" y="170" rx="16" ry="16" width="360" height="120" class="b"/>
  <text x="800" y="225" text-anchor="middle" class="h">cloud and edge platforms</text>
  <text x="800" y="260" text-anchor="middle" class="s">infrastructure trust gets repriced</text>

  <rect x="1060" y="170" rx="16" ry="16" width="360" height="120" class="b"/>
  <text x="1240" y="225" text-anchor="middle" class="h">enterprise software</text>
  <text x="1240" y="260" text-anchor="middle" class="s">human-speed workflows look weaker</text>

  <rect x="310" y="430" rx="20" ry="20" width="980" height="160" class="b"/>
  <text x="800" y="485" text-anchor="middle" class="h">shared investor question</text>
  <text x="800" y="525" text-anchor="middle" class="s">Which firms can adapt when vulnerability discovery, exploit design, and operational pressure accelerate at machine speed?</text>
  <text x="800" y="560" text-anchor="middle" class="s">The market stops rewarding only scale and starts rewarding resilience, remediation velocity, and architectural adaptability.</text>

  <path d="M360 290 V430" class="d"/>
  <path d="M800 290 V430" class="d"/>
  <path d="M1240 290 V430" class="d"/>

  <text x="160" y="835" class="s">This is a conceptual sector map, not a price table: the point is cross-category repricing pressure, not a claim about identical business exposure.</text>
</svg>
