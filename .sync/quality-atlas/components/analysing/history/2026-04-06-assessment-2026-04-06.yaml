assessment_notes:
- Analysing reads as a Symfony/Doctrine-backed analytics runtime with strong internal
  guards and containerized ops, but it lacks a README, visible CI evidence, and release
  tagging to confidently claim RC.
- Assessment grounded only in repository files and current snapshot; no external tool
  outputs parsed
- Component is enabled in registry; scheduled assessment runner integration is assumed
  but not evidenced here
- Docs exist under docs/, but no README and no Antora nav/index are present in this
  repo
- phpunit.xml.dist is present; prefer a concrete phpunit.xml (or CI override) with
  coverage thresholds
assessment_confidence: medium
