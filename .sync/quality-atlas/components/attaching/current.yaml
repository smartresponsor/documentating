- Modern Symfony 8-based attachment component with tests and static analysis in place;
  key gaps are CI/release hygiene, documentation depth, and a naming mismatch to the
  component/repo.
- Composer declares proprietary license, indicating internal use
- Public index.php and bin/console indicate a Symfony application footprint alongside
  a bundle class; clarify packaging intent (app vs reusable bundle)
- Repository is clean (no pending changes) and on master branch
