risks:
- No git tags detected; component remains pre-RC
- Antora navigation/index not present, reducing discoverability of the report in docs
  site
- Local scan environment shows PHP 8.3 while composer targets ^8.4 (potential CI/runtime
  mismatch)
- Proprietary license may limit external ecosystem adoption
