assessment_notes:
- Antora-powered docs site with custom domain and automated gh-pages publishing; strong
  operational scaffolding but missing content QA gates, previews, and rollback clarity.
- Assessment grounded in repository facts and existing snapshot; no runtime telemetry
  present in-repo.
- Workflows use Node 24 and Python 3.12; Antora 3.1.12 with lunr extension is configured.
- Operational directories (.gate, .deploy, .smoke, .intelligence, .commanding) are
  present but not fully documented.
