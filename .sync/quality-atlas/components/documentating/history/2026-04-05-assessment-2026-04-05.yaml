assessment_notes:
- Antora-driven documentation site with automated GitHub Pages publishing and scheduled
  Quality Atlas assessment; strong delivery scaffolding but limited automated content
  QA and minimal runtime/observability typical of static sites.
- Scope is a documentation component; many runtime metrics are naturally less relevant.
- Assessment is based on repository structure and CI workflows; no separate quality
  tool outputs were provided.
- This component is bootstrap-enabled inside the atlas repository to provide a live
  local target.
